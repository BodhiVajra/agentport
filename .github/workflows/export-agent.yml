name: Export Agent

on:
  push:
    branches:
      - main
    paths:
      - 'src/agentport/**'
      - 'examples/**'
  workflow_dispatch:

jobs:
  export-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AgentPort
        run: pip install agentport

      - name: Validate and export agent
        id: export
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          
          # Validate the example file
          echo "=== Validating examples/hangzhou-code-reviewer.af ==="
          agentport validate examples/hangzhou-code-reviewer.af
          
          # Export portable version with timestamp
          echo "=== Exporting portable version ==="
          OUTPUT_FILE="examples/hangzhou-code-reviewer-${TIMESTAMP}.af"
          agentport export examples/hangzhou-code-reviewer.af --format yaml --output "$OUTPUT_FILE"
          
          echo "portable_file=$OUTPUT_FILE" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Commit and push portable version
        run: |
          TIMESTAMP=${{ steps.export.outputs.timestamp }}
          PORTABLE_FILE=${{ steps.export.outputs.portable_file }}
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add both the main file and portable version
          git add examples/hangzhou-code-reviewer.af "$PORTABLE_FILE"
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: export portable agent file ($TIMESTAMP)"
            git push
            echo "✓ Pushed portable version: $PORTABLE_FILE"
          fi

      - name: Upload latest artifact
        uses: actions/upload-artifact@v4
        with:
          name: hangzhou-code-reviewer-latest
          path: examples/hangzhou-code-reviewer.af
          retention-days: 7
